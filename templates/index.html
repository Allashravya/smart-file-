<!DOCTYPE html>
<html>

<head>
    <title>Smart File Search Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🔍 Smart File Search Engine</h1>

        <p class="subtitle">
            Search documents instantly using Trie & Inverted Index
        </p>

        <form method="POST">

            <div class="search-box">

                <input
                    type="text"
                    name="query"
                    placeholder="Search keywords..."
                    required>

                <button type="submit">
                    Search
                </button>

            </div>

        </form>

        {% if results %}

        <div class="results">

            <h2>Results Found</h2>

            {% for doc, score in results %}

            <div class="card">

                <h3>

<a href="{{ url_for('view_document', filename=doc) }}">
    {{ doc }}
</a>
</h3>
                <p>
                    Relevance Score:
                    <span class="score">{{ score }}</span>
                </p>

            </div>

            {% endfor %}

        </div>

        {% endif %}

    </div>

</body>

</html>
